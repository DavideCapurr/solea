name = "solea-coach-proxy"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Limite di messaggi Claude al giorno per utente.
[vars]
DAILY_MESSAGE_LIMIT = "10"

# Conteggio rate-limit per utente. Crea il namespace con:
#   wrangler kv namespace create RATE_LIMIT
# e incolla qui l'id restituito.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# La chiave Anthropic NON va qui: impostala come secret cifrato con
#   wrangler secret put ANTHROPIC_API_KEY
