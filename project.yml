name: Solea
options:
  bundleIdPrefix: com.davidecapurro
  developmentLanguage: it
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  knownRegions:
    - it
    - en
    - es
    - fr
    - de
    - pt

packages:
  SoleaCore:
    path: SoleaCore

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"

targets:
  Solea:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    dependencies:
      - package: SoleaCore
      - target: SoleaWidgets
      - target: SoleaWatch
        embed: true
    entitlements:
      path: App/Solea.entitlements
      properties:
        # WeatherKit — UV index e previsioni orarie
        com.apple.developer.weatherkit: true
        # HealthKit — scrittura Time in Daylight
        com.apple.developer.healthkit: true
        # Game Center — classifiche e achievement
        com.apple.developer.game-center: true
        # App Groups — condivisione snapshot UV con il Widget
        com.apple.security.application-groups:
          - group.com.davidecapurro.solea
        # Push Notifications — richiesto da Live Activity / ActivityKit
        aps-environment: "$(APS_ENVIRONMENT)"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Solea
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        GKGameCenterEnabled: true
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Solea usa la tua posizione per mostrarti l'indice UV attuale e calcolare un limite prudente di esposizione."
        NSHealthUpdateUsageDescription: "Solea salva su Salute il tempo trascorso alla luce del giorno durante le tue sessioni."
        NSHealthShareUsageDescription: "Solea non legge dati da Salute; il permesso serve solo per la scrittura delle sessioni."
        NSPhotoLibraryUsageDescription: "Solea usa le foto che scegli per il diario fotografico dell'abbronzatura. Le immagini restano sul tuo dispositivo e non vengono mai caricate."
        SoleaAppStoreURL: ""
        SoleaPrivacyPolicyURL: "https://davidecapurr.github.io/solea/privacy/"
        SoleaSupportURL: "https://davidecapurr.github.io/solea/support/"
        SoleaCoachProxyURL: "$(SOLEA_COACH_PROXY_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidecapurro.Solea
        TARGETED_DEVICE_FAMILY: "1"
        SOLEA_COACH_PROXY_URL: ""
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production

  SoleaWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - Shared
      - path: App/Resources/Localizable.xcstrings
    dependencies:
      - package: SoleaCore
    entitlements:
      path: Widgets/SoleaWidgets.entitlements
      properties:
        # App Groups — lettura snapshot UV scritto dall'app principale
        com.apple.security.application-groups:
          - group.com.davidecapurro.solea
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Solea Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.davidecapurro.Solea.Widgets

  SoleaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - WatchApp
    dependencies:
      - package: SoleaCore
    entitlements:
      path: WatchApp/SoleaWatch.entitlements
      properties:
        # WeatherKit — UV index al polso
        com.apple.developer.weatherkit: true
        # Game Center — classifiche e achievement (allineato all'app iOS)
        com.apple.developer.game-center: true
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Solea
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.davidecapurro.Solea
        NSLocationWhenInUseUsageDescription: "Solea usa la tua posizione per mostrarti l'indice UV attuale al polso."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidecapurro.Solea.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SoleaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/SoleaTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.davidecapurro.SoleaTests

schemes:
  Solea:
    build:
      targets:
        Solea: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SoleaTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
